<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>Task Management</title>
  </head>
  <body>
    <div class="bg-cyan-200 h-screen pt-20">
      <div class="w-2/4 mx-auto flex flex-col gap-8">
        <div class="flex justify-between items-end">
          <p class="text-4xl font-bold">Task List</p>
          <button
            class="bg-blue-700 rounded-xl h-10 w-30 border-blue-200 active:scale-95 active:bg-blue-900 active:border-2 active:border-black transition duration-150 ease-in-out text-white hover:to-blue-800 hover:border hover:border-gray-600"
          >
            Add Task
          </button>
        </div>
        <div
          class="h-20 w-full bg-white rounded-3xl shadow-[0_3px_10px_rgb(0,0,0,0.2)] flex items-center text-2xl text-cyan-500 font-bold px-10"
        >
          <div class="flex w-100 justify-start">Task</div>
          <div class="w-full flex justify-between">
            <p>Priority</p>
            <p>Status</p>
            <p class="text-orange-400">Action</p>
          </div>
        </div>
        <!--Test Dynamic UI , Will be append from JavaScript-->
        <div
          class="h-20 w-full bg-white rounded-tl-2xl rounded-br-2xl flex items-center text-lg font-bold px-10"
        >
          <div class="flex w-100 justify-start">Task name</div>
          <div class="w-full flex justify-between">
            <p>Hight</p>
            <p class="ml-10">Complete</p>
            <div class="flex text-2xl w-18 justify-between">
              <button
                onclick="alert('Hello')"
                class="active:scale-95 transition duration-150 ease-in-out"
              >
                <i class="fa-solid fa-pen-to-square text-blue-700"></i></button
              ><button
                onclick="alert('Hello')"
                class="active:scale-95 transition duration-150 ease-in-out"
              >
                <i class="fa-solid fa-trash text-red-500"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
