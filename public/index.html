<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>Task Management</title>
  </head>
  <body>
    <div class="bg-cyan-200 h-screen pt-20">
      <div class="w-2/4 mx-auto flex flex-col gap-8" id="container">
        <div class="flex justify-between items-end">
          <p class="text-4xl font-bold">Task List</p>
          <button
            id="btnOpenModal"
            class="bg-blue-700 rounded-xl h-10 w-30 border-blue-200 active:scale-95 active:bg-blue-900 active:border-2 active:border-black transition duration-150 ease-in-out text-white hover:border hover:border-gray-600"
            onclick="openModal()"
          >
            Add Task
          </button>
        </div>
        <div
          class="h-20 w-full bg-white rounded-3xl shadow-[0_3px_10px_rgb(0,0,0,0.2)] flex items-center text-2xl text-cyan-500 font-bold px-10"
        >
          <div class="flex w-100 justify-start">Task</div>
          <div class="w-full flex justify-between">
            <p>Priority</p>
            <p>Status</p>
            <p class="text-orange-400">Action</p>
          </div>
        </div>
      </div>
      <div
        id="modal"
        class="fixed inset-0 bg-gray-500/50 justify-center items-center flex"
      >
        <div
          class="bg-white flex flex-col rounded-2xl shadow-xl w-130 h-100 mx-auto px-8 py-5"
        >
          <div class="flex justify-between">
            <p class="text-xl font-bold">Add Task</p>
            <button
              class="active:scale-95 transition duration-150 ease-in-out text-black text-xl hover:text-red-500"
              id="btnCloseModal"
              onclick="closeModal()"
            >
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
          <div class="flex flex-col h-20 w-full mt-3 gap-2">
            <p class="font-bold text-xl">Task</p>
            <input
              id="taskValue"
              type="text"
              class="border-black border w-3/4 h-10 rounded-xl focus:border-sky-500 focus:outline focus:outline-sky-500 px-4"
              placeholder="Web Homework by Teacher Makara <3"
            />
          </div>
          <div class="flex flex-col h-20 w-full mt-3 gap-2">
            <p class="font-bold text-xl">Prority</p>
            <div class="flex gap-5">
              <button
                id="btnHigh"
                class="btnPriority w-25 h-10 border border-red-500 rounded-xl hover:bg-red-500 hover:text-white flex flex-col justify-center items-center text-red-500"
                value="High"
              >
                High
              </button>
              <button
                id="btnMedium"
                class="btnPriority w-25 h-10 border border-amber-500 rounded-xl hover:bg-yellow-500 hover:text-white text-yellow-500 flex flex-col justify-center items-center"
                value="Medium"
              >
                Medium
              </button>
              <button
                id="btnLow"
                class="btnPriority w-25 h-10 border border-green-500 rounded-xl hover:bg-green-500 hover:text-white text-green-500 flex flex-col justify-center items-center"
                value="Low"
              >
                Low
              </button>
            </div>
          </div>
          <div class="flex flex-col h-20 w-full mt-3 gap-2">
            <p class="font-bold text-xl">Progress</p>
            <div class="flex gap-5">
              <button
                id="btnTodo"
                class="btnInProgress w-25 h-10 border-2 border-cyan-300 rounded-xl hover:bg-cyan-300 hover:text-black flex flex-col justify-center items-center"
                value="Todo"
              >
                Todo
              </button>
              <button
                id="btnProgress"
                class="btnInProgress w-25 h-10 border-2 border-cyan-300 rounded-xl hover:bg-cyan-300 hover:text-black flex flex-col justify-center items-center"
                value="Progress"
              >
                Progress
              </button>
              <button
                id="btnComplete"
                class="btnInProgress w-25 h-10 border-2 border-cyan-300 rounded-xl hover:bg-cyan-300 hover:text-black flex flex-col justify-center items-center"
                value="Completed"
              >
                Completed
              </button>
            </div>
          </div>
          <div class="w-full flex justify-end mt-5">
            <button
              id="addTask"
              class="bg-blue-700 rounded-xl h-10 w-30 border-blue-200 active:scale-95 active:bg-blue-900 active:border-2 active:border-black transition duration-150 ease-in-out text-white hover:border hover:border-gray-600"
              onclick="addTask()"
            >
              Add
            </button>
          </div>
        </div>
      </div>
      <div
        id="modalEdit"
        class="fixed inset-0 bg-gray-500/50 justify-center items-center flex"
      >
        <div
          class="bg-white flex flex-col rounded-2xl shadow-xl w-130 h-100 mx-auto px-8 py-5"
        >
          <p class="text-xl font-bold">Edit Task</p>
          <div class="flex flex-col h-20 w-full mt-3 gap-2">
            <p class="font-bold text-xl">Task</p>
            <input
              id="taskToEdit"
              type="text"
              class="border-black border w-3/4 h-10 rounded-xl focus:border-sky-500 focus:outline focus:outline-sky-500 px-4"
            />
          </div>
          <div class="flex flex-col h-20 w-full mt-3 gap-2">
            <p class="font-bold text-xl">Prority</p>
            <div class="flex gap-5">
              <button
                id="btnHighEdit"
                class="btnPriority w-25 h-10 border border-red-500 rounded-xl hover:bg-red-500 hover:text-white flex flex-col justify-center items-center text-red-500"
                value="High"
              >
                High
              </button>
              <button
                id="btnMediumEdit"
                class="btnPriority w-25 h-10 border border-amber-500 rounded-xl hover:bg-yellow-500 hover:text-white text-yellow-500 flex flex-col justify-center items-center"
                value="Medium"
              >
                Medium
              </button>
              <button
                id="btnLow"
                class="btnPriority w-25 h-10 border border-green-500 rounded-xl hover:bg-green-500 hover:text-white text-green-500 flex flex-col justify-center items-center"
                value="Low"
              >
                Low
              </button>
            </div>
          </div>
          <div class="flex flex-col h-20 w-full mt-3 gap-2">
            <p class="font-bold text-xl">Progress</p>
            <div class="flex gap-5">
              <button
                id="btnTodoEdit"
                class="btnInProgress w-25 h-10 border-2 border-cyan-300 rounded-xl hover:bg-cyan-300 hover:text-black flex flex-col justify-center items-center"
                value="Todo"
              >
                Todo
              </button>
              <button
                id="btnProgressEdit"
                class="btnInProgress w-25 h-10 border-2 border-cyan-300 rounded-xl hover:bg-cyan-300 hover:text-black flex flex-col justify-center items-center"
                value="Progress"
              >
                Progress
              </button>
              <button
                id="btnCompleteEdit"
                class="btnInProgress w-25 h-10 border-2 border-cyan-300 rounded-xl hover:bg-cyan-300 hover:text-black flex flex-col justify-center items-center"
                value="Completed"
              >
                Completed
              </button>
            </div>
          </div>
          <div class="w-full flex justify-end mt-5 gap-5">
            <button
              id="updateButtonEdit"
              class="bg-blue-700 rounded-xl h-10 w-30 border-blue-200 active:scale-95 active:bg-blue-900 active:border-2 active:border-black transition duration-150 ease-in-out text-white hover:border hover:border-gray-600"
              onclick="updateTask()"
            >
              Update
            </button>
            <button
              id="cancelButtonEdit"
              class="bg-red-700 rounded-xl h-10 w-30 border-blue-200 active:scale-95 active:bg-red-900 active:border-2 active:border-black transition duration-150 ease-in-out text-white hover:border hover:border-gray-600"
              onclick="cancelEditModal()"
            >
              Cancel
            </button>
          </div>
        </div>
      </div>
      <div
        id="modalDelete"
        class="fixed inset-0 bg-gray-500/50 justify-center items-center flex"
      >
        <div
          class="bg-white flex flex-col rounded-2xl shadow-xl w-100 h-70 mx-auto px-8 py-5 items-center"
        >
          <div class="flex flex-col items-center text-red-500 font-bold">
            <p class="text-2xl">Are you sure</p>
            <p class="text-3xl">Delete this Task ?</p>
            <i class="fa-solid fa-triangle-exclamation mt-5 text-6xl"></i>
          </div>
          <div class="flex mt-10 gap-5">
            <button
              id="confirmDeleteBtn"
              class="bg-red-500 rounded-xl h-10 w-25 border-blue-200 active:scale-95 active:bg-red-900 active:border-2 active:border-black transition duration-150 ease-in-out text-white hover:border hover:border-gray-600"
            >
              Yes, Delete</button
            ><button
              id="cancelDeleteBtn"
              class="bg-blue-700 rounded-xl h-10 w-25 border-blue-200 active:scale-95 active:bg-blue-900 active:border-2 active:border-black transition duration-150 ease-in-out text-white hover:border hover:border-gray-600"
            >
              No, Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
